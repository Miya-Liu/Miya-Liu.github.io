<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 242 36" fill="none" aria-hidden="true">
  <!-- Playful modernist palette + cartoon chubby shapes -->
  <title>Decorative marks</title>
  <!-- Hand-drawn goggles: wobbly lenses, sketchy bridge, shine -->
  <g stroke="#141414" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 4.2 14.5 Q 3.5 18.2 4.5 22.5 Q 6.5 26.2 11.3 26.6 Q 16.6 26.3 18.6 21.8 Q 19.4 17.2 18.4 13 Q 16.4 9.6 11 9.4 Q 5.6 9.7 4.2 14.5 Z" fill="#fdfbf7" stroke-width="1.5"/>
    <path d="M 21.6 14.5 Q 20.9 18.2 21.9 22.5 Q 23.9 26.2 28.7 26.6 Q 34 26.3 36 21.8 Q 36.8 17.2 35.8 13 Q 33.8 9.6 28.4 9.4 Q 23 9.7 21.6 14.5 Z" fill="#fdfbf7" stroke-width="1.5"/>
    <path d="M 18.6 17.9 Q 19.8 18.3 21.2 17.7" fill="none" stroke-width="1.95"/>
    <path d="M 3.8 11.8 Q 11 9.8 18.2 11.6" fill="none" stroke-width="1.15" opacity="0.55"/>
    <path d="M 21.8 11.6 Q 28.8 9.9 35.8 11.4" fill="none" stroke-width="1.12" opacity="0.55"/>
    <path d="M 7.4 15.2 Q 7 16.2 8.2 16.8 Q 9.4 16.9 9.8 15.6 Q 9.4 14.3 8.1 14.2 Q 6.9 14.3 7.4 15.2 Z" fill="#ffffff" stroke="none"/>
    <path d="M 25.4 15.2 Q 25 16.2 26.2 16.8 Q 27.4 16.9 27.8 15.6 Q 27.4 14.3 26.1 14.2 Q 24.9 14.3 25.4 15.2 Z" fill="#ffffff" stroke="none"/>
  </g>
  <!-- Mark 2: hand-drawn painting board (easel canvas) -->
  <g stroke-linecap="round" stroke-linejoin="round" transform="translate(57, 18) rotate(-5)">
    <!-- legs behind -->
    <path d="M -5.2 3.2 L -7 12.5" stroke="#141414" stroke-width="1.3"/>
    <path d="M 5.4 3.2 L 7.2 12.5" stroke="#141414" stroke-width="1.3"/>
    <path d="M 0.2 3.2 L 0.2 11.8" stroke="#141414" stroke-width="1.35"/>
    <!-- canvas -->
    <path d="M -7.2 -8.5 L 7.4 -8.8 L 7.8 3.2 L -7.6 3.4 Z" fill="#fffef9" stroke="#141414" stroke-width="1.4"/>
    <!-- wooden frame -->
    <path d="M -6.6 -7.8 L 6.8 -8 L 7.2 2.6 L -6.8 2.7 Z" fill="none" stroke="#a16207" stroke-width="1.05"/>
    <!-- paint on canvas -->
    <path d="M -3 -4.5 Q 0.5 -6 3.2 -4 Q 4 -1.5 2 0.5 Q -0.5 1 -2.5 -0.5 Q -4 -2.5 -3 -4.5 Z" fill="#ea580c" stroke="#141414" stroke-width="1.05"/>
    <path d="M 2.5 -2 Q 4.5 -0.5 5 1.5" fill="none" stroke="#141414" stroke-width="0.75" opacity="0.42"/>
  </g>
  <!-- Mark 3: floating cloud — classic 3-bump silhouette + shadow -->
  <g stroke-linecap="round" stroke-linejoin="round" transform="translate(22, 0)">
    <!-- soft ground shadow -->
    <path d="M 62.5 29.6 Q 67.8 28.2 72 28.1 Q 76.5 28.2 81.5 29.7 Q 76.2 31.2 72 31.1 Q 67.5 31.2 62.5 29.6 Z" fill="#141414" opacity="0.07" stroke="none"/>
    <!-- outline: one loop — small left lobe, high center, smaller right, soft bottom -->
    <path d="M 61.5 25.8 Q 59.2 20.5 60.8 16 Q 62.5 11.5 66.2 9.8 Q 68.8 7.2 72.5 7 Q 76.2 6.8 79.5 8.8 Q 83.2 11 84.5 15.5 Q 85.5 20 84.2 24.2 Q 82.8 27.8 79.5 29.5 Q 75.8 30.8 71.8 30.6 Q 67.5 30.5 64.2 29.2 Q 61.8 28 61.5 25.8 Z" fill="#fffef9" stroke="#141414" stroke-width="1.4"/>
    <!-- highlight on left lobe -->
    <path d="M 64.8 15.2 Q 67.5 13 69.8 13.5 Q 68.5 15.8 66.2 16.5 Q 64.5 16.2 64.8 15.2 Z" fill="#ffffff" opacity="0.42" stroke="none"/>
    <!-- light fluff strokes -->
    <path d="M 65.5 13.5 Q 69.2 11.8 73.5 12.2" fill="none" stroke="#141414" stroke-width="0.78" opacity="0.32"/>
    <path d="M 75.5 11 Q 79.5 12.5 81.8 15.5" fill="none" stroke="#141414" stroke-width="0.72" opacity="0.26"/>
    <path d="M 65.8 22.5 Q 72 21.2 79.5 23" fill="none" stroke="#141414" stroke-width="0.65" opacity="0.2"/>
  </g>
  <!-- Hand-drawn deck of books (replaces mint smiley) -->
  <g stroke-linecap="round" stroke-linejoin="round" transform="translate(29, 0)">
    <!-- back book -->
    <path d="M 93.2 12.5 Q 94 10.8 96.5 10.5 L 106.8 11.2 Q 108.5 11.8 108.2 14 L 107.5 25.8 Q 106.2 27.2 104 27 L 93.5 26.2 Q 92 25.5 92.5 23 Z" fill="#99f6e4" stroke="#141414" stroke-width="1.4"/>
    <path d="M 95.5 11.5 L 95 25.5" fill="none" stroke="#141414" stroke-width="1.1"/>
    <!-- middle book -->
    <path d="M 95.8 10.5 Q 97.2 8.8 99.8 8.5 L 110.5 9.5 Q 112.5 10.2 112.2 12.8 L 111.5 27 Q 110 28.5 107.5 28.2 L 96.2 27.3 Q 94.5 26.6 95 24 Z" fill="#7dd3c0" stroke="#141414" stroke-width="1.35"/>
    <path d="M 98.2 9.8 L 97.6 26.8" fill="none" stroke="#141414" stroke-width="1.05"/>
    <!-- front book (pages) -->
    <path d="M 98.5 8.8 Q 100.5 7.2 103.5 7 L 114.2 8.2 Q 116 9 115.8 11.8 L 115 28.5 Q 113.2 30 110.5 29.8 L 99 28.8 Q 97 28 97.5 25.5 Z" fill="#fdfbf7" stroke="#141414" stroke-width="1.45"/>
    <path d="M 101.2 8.5 L 100.5 28.2" fill="none" stroke="#141414" stroke-width="1.15"/>
    <!-- sketchy page lines -->
    <path d="M 103 12.5 Q 110.5 13 113 13.5" fill="none" stroke="#141414" stroke-width="0.95"/>
    <path d="M 103.2 16.5 Q 110 17 112.5 17.4" fill="none" stroke="#141414" stroke-width="0.9"/>
    <path d="M 103.5 20.5 Q 109.5 21 112 21.3" fill="none" stroke="#141414" stroke-width="0.85"/>
  </g>
  <!-- Hand-drawn cocktail glass (wobbly lines, orange drink) -->
  <g stroke-linecap="round" stroke-linejoin="round" transform="translate(36, 0)">
    <!-- bowl glass -->
    <path d="M 118.8 7.1 Q 122.8 5.9 128 5.5 Q 133.2 5.8 137.2 7.2 L 131.6 16.9 Q 128 18.4 124.4 16.9 Z" fill="#fffef9" stroke="#141414" stroke-width="1.45"/>
    <!-- orange drink (on top of glass fill) -->
    <path d="M 121.4 12.2 Q 124.2 15.6 128 16.4 Q 131.8 15.6 134.6 12.2 Q 132.4 10.4 128 10.1 Q 123.6 10.4 121.4 12.2 Z" fill="#ea580c" stroke="#141414" stroke-width="1.05"/>
    <!-- rim sketch -->
    <path d="M 118.5 7.3 Q 128 6.2 137.5 7.4" fill="none" stroke="#141414" stroke-width="1.2"/>
    <!-- stem -->
    <path d="M 127.8 17.5 Q 128.4 21 127.6 25.2" fill="none" stroke="#141414" stroke-width="1.35"/>
    <!-- foot -->
    <path d="M 120.5 25.5 Q 128 27.5 135.5 25.4" fill="none" stroke="#141414" stroke-width="1.4"/>
    <!-- olive + pick -->
    <circle cx="129.5" cy="8.5" r="1.1" fill="#15803d" stroke="#141414" stroke-width="0.9"/>
    <path d="M 129.5 7.4 L 130.8 5.2" fill="none" stroke="#141414" stroke-width="1"/>
  </g>
  <!-- Hand-drawn code: sketchy </> + dot (cursor) — shorter than other marks -->
  <g stroke-linecap="round" stroke-linejoin="round" transform="translate(43, 0) translate(154.5, 18) scale(1, 0.72) translate(-154.5, -18)">
    <path d="M 143.2 9 L 140.5 18.2 L 143.6 27" fill="none" stroke="#141414" stroke-width="1.45"/>
    <path d="M 151 8.2 Q 149 13.5 151.5 18 Q 154 22.5 151.8 27.6" fill="none" stroke="#141414" stroke-width="1.35"/>
    <path d="M 158.4 9.2 L 161.8 18 L 158.3 26.8" fill="none" stroke="#141414" stroke-width="1.45"/>
    <circle cx="154.8" cy="18" r="1.15" fill="#1d3557" stroke="#141414" stroke-width="0.85"/>
  </g>
  <!-- Mark 7: hand-drawn digital keyboard (mini MIDI / keys for music fun) -->
  <g stroke-linecap="round" stroke-linejoin="round" transform="translate(211, 0)">
    <!-- body / case (slightly wobbly slab) -->
    <path d="M 3.5 10.8 L 26.5 11.5 L 26.2 29.8 L 4.2 29.2 Z" fill="#cbd5e1" stroke="#141414" stroke-width="1.35"/>
    <path d="M 5.2 9.8 Q 15 8.6 24.8 9.6" fill="none" stroke="#ea580c" stroke-width="1" opacity="0.85"/>
    <!-- key bed -->
    <path d="M 4.8 13.2 L 25.8 13.5 L 25.5 28.5 L 5.2 28.2 Z" fill="#fffef9" stroke="#141414" stroke-width="1.1"/>
    <!-- white keys (splits) -->
    <path d="M 9.2 13.5 L 9.2 28.2" stroke="#141414" stroke-width="0.75" opacity="0.42"/>
    <path d="M 13.5 13.5 L 13.5 28.3" stroke="#141414" stroke-width="0.75" opacity="0.42"/>
    <path d="M 17.8 13.5 L 17.8 28.3" stroke="#141414" stroke-width="0.75" opacity="0.42"/>
    <path d="M 22.2 13.5 L 22.2 28.3" stroke="#141414" stroke-width="0.75" opacity="0.42"/>
    <!-- black keys (short) -->
    <path d="M 6.5 13.6 L 8.6 13.6 L 8.5 21.8 L 6.5 21.8 Z" fill="#141414" stroke="#141414" stroke-width="1"/>
    <path d="M 10.8 13.6 L 12.9 13.6 L 12.8 21.8 L 10.8 21.8 Z" fill="#141414" stroke="#141414" stroke-width="1"/>
    <path d="M 15.2 13.6 L 17.2 13.6 L 17.1 21.8 L 15.2 21.8 Z" fill="#141414" stroke="#141414" stroke-width="1"/>
    <path d="M 19.5 13.6 L 21.6 13.6 L 21.5 21.8 L 19.5 21.8 Z" fill="#141414" stroke="#141414" stroke-width="1"/>
    <!-- tiny “fun” sparkle -->
    <path d="M 24.5 7.5 L 25.2 8.8 M 24.1 8.2 L 25.6 8.2" stroke="#141414" stroke-width="0.85" opacity="0.55"/>
  </g>
</svg>
